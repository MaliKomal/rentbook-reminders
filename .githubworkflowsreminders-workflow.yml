name: RentBook Daily WhatsApp Reminders

# Runs automatically every day at 9:00 AM IST (3:30 AM UTC), completely
# free on GitHub's shared runners for a repo this small. No server needed.
on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send today's reminders
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
        run: node send-reminders.js
